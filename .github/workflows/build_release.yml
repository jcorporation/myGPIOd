name: release
on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: installdeps
      run: |
        sudo tee /etc/apt/sources.list.d/bookworm-backports.list <<< "deb http://ftp.de.debian.org/debian bookworm-backports main"
        sudo apt-get update
        sudo apt-get -y install cmake build-essential git  libgpiod-dev libmpdclient-dev libcurl4-gnutls-dev pkgconf
    - name: build
      run: |
        cmake -B release -DCMAKE_INSTALL_PREFIX:PATH=/usr -DCMAKE_BUILD_TYPE=Release .
        cmake --build release
    - name: install
      run: sudo cmake --install release
