name: "CodeQL"

on:
  push:
    branches: [ master, devel ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master, devel ]
  schedule:
    - cron: '41 14 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: installdeps
      run: |
        sudo tee /etc/apt/sources.list.d/bookworm-backports.list <<< "deb http://ftp.de.debian.org/debian bookworm-backports main"
        sudo apt-get update
        sudo apt-get -y install cmake build-essential git  libgpiod-dev libmpdclient-dev libcurl4-gnutls-dev pkgconf

    - name: Compile
      run: ./build.sh debug

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
