name: "CodeQL"

on:
  push:
    branches: [ master, devel ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master, devel ]
  schedule:
    - cron: '41 14 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: installdeps
      run: |
        curl https://ftp-master.debian.org/keys/archive-key-13.asc | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/trixie.gpg --import
        sudo tee /etc/apt/sources.list.d/trixie.list <<< "deb [signed-by=/usr/share/keyrings/trixie.gpg] http://ftp.de.debian.org/debian trixie main"
        sudo apt-get update
        sudo apt-get -y install cmake build-essential git libmicrohttpd-dev libmpdclient-dev libcurl4-gnutls-dev libgpiod-dev pkgconf

    - name: Compile
      run: ./build.sh debug

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
