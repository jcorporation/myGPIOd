name: release_minimal
on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: installdeps
      run: |
        curl https://ftp-master.debian.org/keys/archive-key-13.asc | sudo gpg --no-default-keyring --keyring /usr/share/keyrings/trixie.gpg --import
        sudo tee /etc/apt/sources.list.d/trixie.list <<< "deb [signed-by=/usr/share/keyrings/trixie.gpg] http://ftp.de.debian.org/debian trixie main"
        sudo apt-get update
        sudo apt-get -y install cmake build-essential git libgpiod-dev pkgconf
    - name: build
      run: |
        cmake -B release -DCMAKE_INSTALL_PREFIX:PATH=/usr -DCMAKE_BUILD_TYPE=Release -DMYGPIOD_ENABLE_ACTION_MPC=OFF -DMYGPIOD_ENABLE_ACTION_HTTP=OFF -DMYGPIOD_ENABLE_ACTION_LUA=OFF .
        cmake --build release
    - name: install
      run: sudo cmake --install release
