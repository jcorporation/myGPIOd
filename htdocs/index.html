<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPIOweb</title>
  <link href="bootstrap.min.css" rel="stylesheet">
  <link href="mygpiod.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand fixed-top">
      <a class="navbar-brand ms-3" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
        <path d="M710-150q-63 0-106.5-43.5T560-300q0-63 43.5-106.5T710-450q63 0 106.5 43.5T860-300q0 63-43.5 106.5T710-150Zm0-80q29 0 49.5-20.5T780-300q0-29-20.5-49.5T710-370q-29 0-49.5 20.5T640-300q0 29 20.5 49.5T710-230Zm-550-30v-80h320v80H160Zm90-250q-63 0-106.5-43.5T100-660q0-63 43.5-106.5T250-810q63 0 106.5 43.5T400-660q0 63-43.5 106.5T250-510Zm0-80q29 0 49.5-20.5T320-660q0-29-20.5-49.5T250-730q-29 0-49.5 20.5T180-660q0 29 20.5 49.5T250-590Zm230-30v-80h320v80H480Zm230 320ZM250-660Z"/>
      </svg>
      myGPIOd
      </a>
    </nav>
  </header>
  <main class="container-fluid">
    <div class="card mb-3">
      <div class="card-header">Configured GPIOs<a id="gpioUpdateAll" href="#" class="float-end" title="Update all"></a></div>
      <div class="card-body">
        <table class="table align-middle">
          <thead>
            <tr><th>GPIO</th><th>Name</th><th>Direction</th><th class="gpio-state-th">State</th><th></th></tr>
          </thead>
          <tbody id="gpios"></tbody>
        </table>
      </div>
      <div class="card-footer"><small id="lastError"></small></div>
    </div>
    <div class="card">
      <div class="card-header">Events<span class="float-end">
        <a id="clearEvents" href="#" title="Clear" class="me-2"></a>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr><th>GPIO / Device</th><th>Timestamp</th><th>Event</th></tr>
          </thead>
          <tbody id="events"></tbody>
        </table>
      </div>
      <div class="card-footer"><small id="pollError"></small></div>
    </div>
  </main>

  <div class="modal fade" id="modalGPIOinfo" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">GPIO Info</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <table class="table">
            <tbody id="modalGPIOinfoList"></tbody>
          </table>
        </div>
        <div class="modal-footer justify-content-between">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalGPIOset" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Set GPIO</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3 row">
            <label class="col-sm-4 col-form-label" for="modalGPIOsetGPIO">GPIO</label>
            <div class="col-sm-8">
              <input id="modalGPIOsetGPIO" class="form-control" readonly="readonly">
            </div>
          </div>
          <div class="mb-3 row">
            <label class="col-sm-4 col-form-label" for="modalGPIOsetValue">Value</label>
            <div class="col-sm-8">
              <select class="form-control" id="modalGPIOsetValue">
                <option value="active">active</option>
                <option value="inactive">inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer justify-content-between">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="modalGPIOsetSet">Set</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalGPIOblink" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Blink GPIO</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3 row">
            <label class="col-sm-4 col-form-label" for="modalGPIOblinkGPIO">GPIO</label>
            <div class="col-sm-8">
              <input id="modalGPIOblinkGPIO" class="form-control" readonly="readonly">
            </div>
          </div>
          <div class="mb-3 row">
            <label class="col-sm-4 col-form-label" for="modalGPIOblinkTimeout">Timeout (ms)</label>
            <div class="col-sm-8">
              <input id="modalGPIOblinkTimeout" class="form-control">
            </div>
          </div>
          <div class="mb-3 row">
            <label class="col-sm-4 col-form-label" for="modalGPIOblinkInterval">Interval (ms)</label>
            <div class="col-sm-8">
              <input id="modalGPIOblinkInterval" class="form-control">
            </div>
          </div>
        </div>
        <div class="modal-footer justify-content-between">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="modalGPIOblinkSet">Set</button>
        </div>
      </div>
    </div>
  </div>

  <script src="bootstrap-native.min.js"></script>
  <script src="mygpiod.js"></script>
</body>
</html>
